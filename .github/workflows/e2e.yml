name: E2E

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC nightly
  workflow_dispatch:
  # Run on every PR — branch protection requires the e2e check, so a
  # paths filter would silently block merges for any PR that doesn't
  # touch test/e2e/** (which was every recent feature PR). The job is
  # ~1 min on cache hit; not worth the gating risk.
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e flow specs
        env:
          E2E_GH_TOKEN: ${{ secrets.E2E_GH_TOKEN }}
          PERF_BUDGET_SCALE: '1.6'
        run: npm run test:e2e

      - name: Run visual regression specs
        # QM-220 — Linux baselines committed in PR #59 don't match the
        # post-PR #60 row layout (size badge text "S · 47" → "S", row
        # height 32px → 15px). Leave continue-on-error until baselines
        # are regenerated on Linux CI; tracked as a Phase 2 follow-up
        # in docs/plans/v1.1-blockers-plan.md.
        continue-on-error: true
        env:
          E2E_GH_TOKEN: ${{ secrets.E2E_GH_TOKEN }}
        run: npm run test:e2e:visual

      - name: Run perf specs
        env:
          E2E_GH_TOKEN: ${{ secrets.E2E_GH_TOKEN }}
          PERF_BUDGET_SCALE: '1.6'
        run: npm run test:perf

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
