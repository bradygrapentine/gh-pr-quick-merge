version: 2
updates:
  # npm dependencies (vitest, playwright, happy-dom, web-ext, etc.)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: development
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions versions in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
